services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "18000:18000"
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
    command: >
      sh -c "python -m app.init_db &&
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -b 0.0.0.0:${BACKEND_PORT:-18000}
      --workers ${WEB_CONCURRENCY:-2}
      --access-logfile -
      --error-logfile -"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "15173:15173"
    environment:
      - HOST=0.0.0.0
      - PORT=15173
      - BACKEND_INTERNAL_URL=http://backend:18000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
